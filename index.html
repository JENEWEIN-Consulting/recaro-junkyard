<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    color: #e8eaf0;
    font-family: 'Archivo', sans-serif;
    overflow-x: hidden;
    background: #060a18;
  }
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('bg.png') center center / cover no-repeat;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(10,23,65,0.85) 0%,
      rgba(10,23,65,0.45) 20%,
      rgba(10,23,65,0.4) 40%,
      rgba(10,23,65,0.55) 60%,
      rgba(10,23,65,0.9) 85%,
      rgba(10,23,65,0.98) 100%
    );
  }
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 52px 24px 60px;
  }
  .logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 44px;
    opacity: 0.5;
  }
  .logos span {
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: #8b9cc6;
  }
  .hero {
    text-align: center;
    margin-bottom: 44px;
  }
  .hero-badge {
    display: inline-block;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: #8b9cc6;
    text-transform: uppercase;
    letter-spacing: 6px;
    border: 1px solid rgba(139,163,210,0.25);
    padding: 8px 20px;
    border-radius: 2px;
    margin-bottom: 28px;
    backdrop-filter: blur(6px);
    background: rgba(10,23,65,0.4);
  }
  h1 {
    font-family: 'Special Elite', monospace;
    font-size: clamp(42px, 9vw, 76px);
    font-weight: 400;
    color: #ffffff;
    text-shadow: 0 0 80px rgba(139,163,210,0.15), 0 3px 12px rgba(0,0,0,0.8);
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 24px;
  }
  .hero-sub {
    font-family: 'Archivo', sans-serif;
    font-size: 20px;
    color: #d0daf0;
    font-style: italic;
    max-width: 420px;
    margin: 0 auto 20px;
    line-height: 1.5;
  }
  .hero-desc {
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    color: rgba(208,218,240,0.75);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.75;
  }
  .line {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3a5090, transparent);
    margin: 40px auto;
  }
  .form-wrap {
    background: rgba(10,23,65,0.6);
    border: 1px solid rgba(139,163,210,0.15);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 52px;
    box-shadow: 0 32px 100px rgba(0,0,0,0.5);
    backdrop-filter: blur(16px);
  }
  .form-wrap iframe {
    border: none;
    border-radius: 10px;
    width: 100%;
  }
  .footer {
    text-align: center;
    padding: 20px 0 0;
    border-top: 1px solid rgba(139,163,210,0.1);
  }
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.55;
    margin-bottom: 10px;
  }
  .footer-row span { font-family: monospace; font-size: 9px; color: #6b82b8; }
  .footer-label {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    color: rgba(140,160,210,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  @media (max-width: 600px) {
    .page { padding: 36px 16px 40px; }
    .hero-badge { font-size: 9px; letter-spacing: 4px; padding: 6px 14px; }
    .hero-sub { font-size: 18px; }
    .form-wrap { padding: 4px; }
  }
</style>
</head>
