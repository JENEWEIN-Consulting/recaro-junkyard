<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECARO Junkyard – The Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    color: #e8eaf0;
    font-family: 'Archivo', sans-serif;
    overflow-x: hidden;
    background: #060a18;
  }
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('bg.png') center center / cover no-repeat;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(10,23,65,0.9) 0%,
      rgba(10,23,65,0.6) 15%,
      rgba(10,23,65,0.55) 40%,
      rgba(10,23,65,0.7) 60%,
      rgba(10,23,65,0.92) 80%,
      rgba(10,23,65,0.98) 100%
    );
  }
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .page {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 60px;
  }

  /* Logos */
  .logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 36px;
    opacity: 0.45;
  }
  .logos span { font-family: 'Special Elite', monospace; font-size: 13px; color: #8b9cc6; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header-badge {
    display: inline-block;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: #8b9cc6;
    text-transform: uppercase;
    letter-spacing: 6px;
    border: 1px solid rgba(139,163,210,0.25);
    padding: 8px 20px;
    border-radius: 2px;
    margin-bottom: 24px;
    backdrop-filter: blur(6px);
    background: rgba(10,23,65,0.4);
  }
  h1 {
    font-family: 'Special Elite', monospace;
    font-size: clamp(36px, 7vw, 64px);
    font-weight: 400;
    color: #ffffff;
    text-shadow: 0 0 80px rgba(139,163,210,0.15), 0 3px 12px rgba(0,0,0,0.8);
    letter-spacing: 5px;
    line-height: 1;
    margin-bottom: 16px;
  }
  .header-sub {
    font-size: 17px;
    color: #d0daf0;
    font-style: italic;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 40px;
    justify-content: center;
    margin: 32px 0;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Special Elite', monospace;
    font-size: 36px;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(139,163,210,0.2);
  }
  .stat-label {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    color: #8b9cc6;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Filter */
  .filter-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .filter-btn {
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 4px;
    border: 1px solid rgba(139,163,210,0.2);
    background: rgba(10,23,65,0.5);
    color: #8b9cc6;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(139,163,210,0.2);
    color: #ffffff;
    border-color: rgba(139,163,210,0.4);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }

  /* Cards */
  .card {
    background: rgba(10,23,65,0.6);
    border: 1px solid rgba(139,163,210,0.15);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: rgba(139,163,210,0.35);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .card-preview {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid rgba(139,163,210,0.1);
  }
  .card-preview-placeholder {
    width: 100%;
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(10,23,65,0.4);
    border-bottom: 1px solid rgba(139,163,210,0.1);
  }
  .card-preview-icon {
    font-size: 52px;
    opacity: 0.6;
  }
  .card-preview-label {
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    color: #8b9cc6;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .card-preview-cta {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    color: #a8b8d8;
    margin-top: 4px;
    padding: 5px 14px;
    border: 1px solid rgba(139,163,210,0.25);
    border-radius: 4px;
    transition: all 0.2s;
  }
  .card:hover .card-preview-cta {
    background: rgba(139,163,210,0.15);
    color: #ffffff;
  }
  .card-body {
    padding: 16px 20px 18px;
  }
  .card-site {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: #6b82b8;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 3px;
  }
  .card-dept {
    font-size: 14px;
    color: #8b9cc6;
    margin-bottom: 8px;
  }
  .card-date {
    font-size: 11px;
    color: rgba(139,163,210,0.4);
  }
  .card-file {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #a8b8d8;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 6px;
    background: rgba(139,163,210,0.1);
    border: 1px solid rgba(139,163,210,0.15);
    transition: all 0.2s;
  }
  .card-file:hover {
    background: rgba(139,163,210,0.2);
    color: #ffffff;
  }
  .card-file-icon {
    font-size: 16px;
  }
  .card-file-type {
    font-size: 10px;
    font-family: 'Special Elite', monospace;
    color: #6b82b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Preview modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    align-items: center;
    justify-content: center;
    background: rgba(6,10,24,0.85);
    backdrop-filter: blur(8px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: rgba(10,23,65,0.95);
    border: 1px solid rgba(139,163,210,0.2);
    border-radius: 16px;
    padding: 32px;
    max-width: 700px;
    width: 92%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    color: #8b9cc6;
    font-size: 24px;
    cursor: pointer;
    font-family: monospace;
  }
  .modal-site {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    color: #6b82b8;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .modal-name {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
  }
  .modal-dept {
    font-size: 16px;
    color: #8b9cc6;
    margin-bottom: 6px;
  }
  .modal-date {
    font-size: 12px;
    color: rgba(139,163,210,0.4);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(139,163,210,0.1);
  }
  .modal-preview {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 16px;
    max-height: 500px;
    object-fit: contain;
    background: rgba(0,0,0,0.2);
  }
  .modal-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #ffffff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 6px;
    background: rgba(139,163,210,0.15);
    border: 1px solid rgba(139,163,210,0.25);
    transition: all 0.2s;
  }
  .modal-download:hover {
    background: rgba(139,163,210,0.25);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text {
    font-family: 'Special Elite', monospace;
    font-size: 18px;
    color: #6b82b8;
  }
  .empty-sub {
    font-size: 14px;
    color: rgba(139,163,210,0.4);
    margin-top: 8px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    font-family: 'Special Elite', monospace;
    color: #6b82b8;
    font-size: 16px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 0 0;
    border-top: 1px solid rgba(139,163,210,0.1);
  }
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.45;
    margin-bottom: 10px;
  }
  .footer-row span { font-family: monospace; font-size: 9px; color: #6b82b8; }
  .footer-label {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    color: rgba(140,160,210,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .page { padding: 32px 16px 40px; }
    .stats { gap: 24px; }
    .stat-num { font-size: 28px; }
    .grid { grid-template-columns: 1fr; gap: 14px; }
  }
</style>
</head>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-site" id="m-site"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-dept" id="m-dept"></div>
    <div class="modal-date" id="m-date"></div>
    <div id="m-preview"></div>
    <a class="modal-download" id="m-download" href="#" target="_blank">Open file ↗</a>
  </div>
</div>

<script>
const SHEET_ID = '1CENgsz1jQssgU96lgLXObOVM2P1h2RtWWcZnxWxgsXY';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let allEntries = [];
let activeFilter = 'All';

async function fetchData() {
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) {
      showEmpty();
      return;
    }
    const headers = rows[0];
    allEntries = rows.slice(1).map(row => ({
      name: row[3] || '',
      site: row[4] || '',
      department: row[5] || '',
      fileUrl: row[6] || '',
      date: row[2] || '',
    })).filter(e => e.name);

    renderStats();
    renderFilters();
    renderGrid();
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="loading">Could not load data. Please refresh.</div>';
  }
}

function parseCSV(text) {
  const rows = [];
  let current = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { current.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        current.push(field.trim()); field = '';
        if (current.some(c => c)) rows.push(current);
        current = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || current.length) { current.push(field.trim()); rows.push(current); }
  return rows;
}

function getFileType(url) {
  const lower = url.toLowerCase();
  if (lower.includes('.jpg') || lower.includes('.jpeg') || lower.includes('.png') || lower.includes('.webp')) return 'image';
  if (lower.includes('.pdf')) return 'pdf';
  if (lower.includes('.pptx') || lower.includes('.ppt')) return 'pptx';
  return 'file';
}

function getFileIcon(type) {
  if (type === 'image') return '🖼';
  if (type === 'pdf') return '📄';
  if (type === 'pptx') return '📊';
  return '📎';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return dateStr; }
}

function renderStats() {
  const sites = new Set(allEntries.map(e => e.site));
  document.getElementById('stats').innerHTML = [
    { v: allEntries.length, l: 'Submissions' },
    { v: sites.size, l: 'Sites' },
  ].map(s => `<div class="stat"><div class="stat-num">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join('');
}

function renderFilters() {
  const sites = ['All', ...new Set(allEntries.map(e => e.site).filter(Boolean).sort())];
  document.getElementById('filters').innerHTML = sites.map(s =>
    `<button class="filter-btn ${s === activeFilter ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}

function setFilter(site) {
  activeFilter = site;
  renderFilters();
  renderGrid();
}

function getGviewUrl(url) {
  return 'https://docs.google.com/gview?url=' + encodeURIComponent(url) + '&embedded=true';
}

function renderGrid() {
  const filtered = activeFilter === 'All' ? allEntries : allEntries.filter(e => e.site === activeFilter);

  if (filtered.length === 0) {
    showEmpty();
    return;
  }

  const html = '<div class="grid">' + filtered.map((entry, i) => {
    const ftype = getFileType(entry.fileUrl);
    let previewHtml;
    if (ftype === 'image') {
      previewHtml = `<img class="card-preview" src="${entry.fileUrl}" alt="Stop List" onerror="this.outerHTML='<div class=card-preview-placeholder><div class=card-preview-icon>📎</div><div class=card-preview-label>File</div></div>'">`;
    } else if (ftype === 'pdf' || ftype === 'pptx') {
      previewHtml = `<iframe class="card-preview" src="${getGviewUrl(entry.fileUrl)}" style="pointer-events:none;" scrolling="no"></iframe>`;
    } else {
      previewHtml = `<div class="card-preview-placeholder"><div class="card-preview-icon">📎</div><div class="card-preview-label">File</div><div class="card-preview-cta">Click to view</div></div>`;
    }
    return `
      <div class="card" onclick="openModal(${allEntries.indexOf(entry)})">
        ${previewHtml}
        <div class="card-body">
          <div class="card-site">${entry.site}</div>
          <div class="card-name">${entry.name}</div>
          <div class="card-dept">${entry.department}</div>
          <div class="card-date">${formatDate(entry.date)}</div>
        </div>
      </div>`;
  }).join('') + '</div>';

  document.getElementById('content').innerHTML = html;
}

function showEmpty() {
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="empty-icon">✈️</div>
      <div class="empty-text">The junkyard is empty</div>
      <div class="empty-sub">No submissions yet. Check back soon.</div>
    </div>`;
}

function openModal(idx) {
  const entry = allEntries[idx];
  document.getElementById('m-site').textContent = entry.site;
  document.getElementById('m-name').textContent = entry.name;
  document.getElementById('m-dept').textContent = entry.department;
  document.getElementById('m-date').textContent = formatDate(entry.date);
  document.getElementById('m-download').href = entry.fileUrl;

  const ftype = getFileType(entry.fileUrl);
  const preview = document.getElementById('m-preview');

  if (ftype === 'image') {
    preview.innerHTML = `<img class="modal-preview" src="${entry.fileUrl}" alt="Stop List" onerror="this.style.display='none'">`;
  } else if (ftype === 'pdf' || ftype === 'pptx') {
    preview.innerHTML = `<iframe class="modal-preview" src="${getGviewUrl(entry.fileUrl)}" style="height:500px;border:none;border-radius:8px;"></iframe>`;
  } else {
    preview.innerHTML = `<div style="text-align:center;padding:40px;color:#6b82b8;font-family:'Special Elite',monospace;">Click "Open file" to view the document</div>`;
  }

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Load data
fetchData();
// Auto-refresh every 60 seconds
setInterval(fetchData, 60000);
</script>
